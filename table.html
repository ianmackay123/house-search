<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Search - All Properties | Sep 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .header {
            background: #2c3e50; color: white; padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header a { color: #74b9ff; text-decoration: none; font-size: 14px; }
        .header a:hover { text-decoration: underline; }
        .controls {
            padding: 12px 24px; background: white; border-bottom: 1px solid #ddd;
            display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
        }
        .controls label { font-size: 13px; cursor: pointer; }
        .controls input[type="checkbox"] { margin-right: 4px; }
        .controls input[type="text"] {
            padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; width: 200px;
        }
        .controls .count { font-size: 13px; color: #666; margin-left: auto; }
        .table-wrap { padding: 0 24px 24px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 12px; font-size: 13px; }
        thead { position: sticky; top: 0; z-index: 10; }
        th {
            background: #34495e; color: white; padding: 10px 12px; text-align: left;
            cursor: pointer; user-select: none; white-space: nowrap;
        }
        th:hover { background: #4a6785; }
        th .arrow { font-size: 10px; margin-left: 4px; opacity: 0.5; }
        th.sorted .arrow { opacity: 1; }
        td { padding: 8px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
        tr:hover td { background: #f0f7ff; }
        tr.bonus td { background: #fff5f5; }
        tr.bonus:hover td { background: #ffe8e8; }
        tr.dismissed td { opacity: 0.35; }
        tr.dismissed:hover td { opacity: 0.5; }
        .source-badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 11px; font-weight: 600; color: white;
        }
        .source-badge.kateandtoms { background: #3498db; }
        .source-badge.groupaccommodation { background: #8e44ad; }
        .source-badge.airbnb { background: #FF5A5F; }
        .source-badge.bighouseexperience { background: #e67e22; }
        .source-badge.snaptrip { background: #1a7f5a; }
        .source-badge.thebigdomain { background: #8e44ad; }
        .source-badge.sykescottages { background: #2471a3; }
        .bonus-star { color: #e74c3c; font-weight: bold; }
        .games-list { font-size: 12px; color: #555; }
        .games-list .highlight { color: #e74c3c; font-weight: 600; }
        a.prop-link { color: #2980b9; text-decoration: none; font-weight: 500; }
        a.prop-link:hover { text-decoration: underline; }
        .dates { font-size: 12px; color: #27ae60; }
        .no-results { text-align: center; padding: 40px; color: #999; font-size: 16px; }
        .thumb-wrap { position: relative; display: inline-block; }
        .thumb { width: 60px; height: 45px; object-fit: cover; border-radius: 3px; display: block; cursor: zoom-in; transition: opacity 0.15s; }
        .thumb:hover { opacity: 0.85; }
        .thumb-wrap:hover .thumb-large { display: block; }
        .thumb-large {
            display: none; position: fixed; z-index: 9999;
            width: 320px; height: 220px; object-fit: cover;
            border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            pointer-events: none; transform: translate(-50%, calc(-100% - 10px));
        }
        .star-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 0 2px; color: #ddd; line-height: 1; }
        .star-btn.starred { color: #f39c12; }
        .star-btn:hover { color: #f39c12; }
        tr.starred td { background: #fffbf0; }
        tr.starred.bonus td { background: #fff0e0; }
        tr.starred:hover td, tr.starred.bonus:hover td { background: #fff3d0; }
        .dismiss-btn {
            background: none; border: 1px solid #ddd; border-radius: 3px; cursor: pointer;
            font-size: 11px; padding: 2px 6px; color: #999; white-space: nowrap;
        }
        .dismiss-btn:hover { background: #fee; border-color: #e74c3c; color: #e74c3c; }
        .dismiss-btn.dismissed { background: #eee; color: #bbb; border-color: #ddd; }
        .note-cell { min-width: 160px; max-width: 260px; }
        .note-ta {
            width: 100%; min-height: 36px; resize: vertical;
            border: 1px solid transparent; border-radius: 3px;
            font-family: inherit; font-size: 12px; color: #444;
            padding: 3px 5px; background: transparent; line-height: 1.4;
        }
        .note-ta:hover { border-color: #ddd; background: #fafafa; }
        .note-ta:focus { border-color: #3498db; background: white; outline: none; }
        .note-ta::placeholder { color: #bbb; }
        .saving-indicator { font-size: 10px; color: #27ae60; margin-left: 4px; display: none; }
        #scrape-panel {
            padding: 10px 24px; background: #fafafa; border-bottom: 1px solid #ddd;
            display: none; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 13px;
        }
        .scrape-btn {
            padding: 5px 12px; border: none; border-radius: 4px;
            cursor: pointer; font-size: 12px; background: #2c3e50; color: white;
        }
        .scrape-btn:disabled { opacity: 0.6; cursor: default; }
        .scrape-btn.running { background: #e67e22; }
        .scrape-btn.done { background: #27ae60; }
        .scrape-btn.error { background: #e74c3c; }
        #scrape-log-wrap {
            width: 100%; margin-top: 6px;
            max-height: 120px; overflow-y: auto;
            font-size: 11px; font-family: monospace;
            background: #f4f4f4; padding: 5px; border-radius: 4px;
            white-space: pre-wrap; word-break: break-all; display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>House Search - All Properties</h1>
        <div>
            <a href="./index.html">View Map</a>
        </div>
    </div>
    <div class="controls" id="controls">
        <strong style="font-size:13px;">Source:</strong>
        <label><input type="checkbox" data-source="kateandtoms" checked onchange="saveFilterState();applyFilters()"> Kate & Tom's</label>
        <label><input type="checkbox" data-source="airbnb" checked onchange="saveFilterState();applyFilters()"> Airbnb</label>
        <label><input type="checkbox" data-source="groupaccommodation" checked onchange="saveFilterState();applyFilters()"> Group Accom.</label>
        <label><input type="checkbox" data-source="thebigdomain" checked onchange="saveFilterState();applyFilters()"> Big Domain</label>
        <label><input type="checkbox" data-source="bighouseexperience" checked onchange="saveFilterState();applyFilters()"> Big House Exp.</label>
        <label><input type="checkbox" data-source="snaptrip" checked onchange="saveFilterState();applyFilters()"> Snaptrip</label>
        <strong style="font-size:13px;margin-left:8px;">Filter:</strong>
        <label><input type="checkbox" id="bonusOnly" onchange="saveFilterState();applyFilters()"> Snooker/table tennis only</label>
        <label><input type="checkbox" id="starredOnly" onchange="saveFilterState();applyFilters()"> ★ Starred only</label>
        <label><input type="checkbox" id="hideDismissed" onchange="saveFilterState();applyFilters()" checked> Hide dismissed</label>
        <input type="text" id="search" placeholder="Search name, location..." oninput="applyFilters()">
        <span class="count" id="count"></span>
    </div>
    <div id="scrape-panel">
        <strong>Scrape:</strong>
        <button class="scrape-btn" onclick="startScrape('all')">All</button>
        <button class="scrape-btn" onclick="startScrape('kateandtoms')">K&amp;T</button>
        <button class="scrape-btn" onclick="startScrape('airbnb')">Airbnb</button>
        <button class="scrape-btn" onclick="startScrape('groupaccommodation')">Group Accom.</button>
        <button class="scrape-btn" onclick="startScrape('thebigdomain')">Big Domain</button>
        <button class="scrape-btn" onclick="startScrape('bighouseexperience')">Big House Exp.</button>
        <button class="scrape-btn" onclick="startScrape('snaptrip')">Snaptrip</button>
        <button class="scrape-btn" id="btn-kill" style="background:#c0392b;display:none;" onclick="killScrape()">Stop</button>
        <div id="scrape-log-wrap"></div>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr id="header-row">
                    <th style="width:32px;cursor:default;text-align:center;" title="Star properties you're interested in">★</th>
                    <th style="width:70px;cursor:default;">Photo</th>
                    <th data-col="name">Name <span class="arrow">&#9650;</span></th>
                    <th data-col="source">Source <span class="arrow">&#9650;</span></th>
                    <th data-col="sleeps">Sleeps <span class="arrow">&#9650;</span></th>
                    <th data-col="location">Location <span class="arrow">&#9650;</span></th>
                    <th data-col="games">Games / Features <span class="arrow">&#9650;</span></th>
                    <th data-col="price">Price <span class="arrow">&#9650;</span></th>
                    <th data-col="rating">Rating <span class="arrow">&#9650;</span></th>
                    <th data-col="available_dates">Availability <span class="arrow">&#9650;</span></th>
                    <th style="cursor:default;">Notes</th>
                    <th style="width:80px;cursor:default;"></th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
        <div class="no-results" id="no-results" style="display:none;">No matching properties found.</div>
    </div>

    <script src="./state.js"></script>
    <script>
        async function toggleStarAndRender(url, btn) {
            var isNow = await toggleStar(url);
            btn.textContent = isNow ? '★' : '☆';
            btn.classList.toggle('starred', isNow);
            var row = btn.closest('tr');
            if (row) row.classList.toggle('starred', isNow);
            if (document.getElementById('starredOnly').checked) applyFilters();
        }

        async function toggleDismissAndRender(url, btn) {
            var isNow = await toggleDismissed(url);
            btn.textContent = isNow ? 'Undismiss' : 'Not suitable';
            btn.classList.toggle('dismissed', isNow);
            var row = btn.closest('tr');
            if (row) row.classList.toggle('dismissed', isNow);
            if (document.getElementById('hideDismissed').checked) applyFilters();
        }

        var allProperties = [];
        var displayed = [];
        var sortCol = 'name';
        var sortAsc = true;

        var LS_KEY = 'house-search-table-filters';

        function saveFilterState() {
            var state = {};
            document.querySelectorAll('.controls input[type="checkbox"]').forEach(function(cb) {
                state[cb.id || cb.dataset.source] = cb.checked;
            });
            try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
        }

        function restoreFilterState() {
            try {
                var state = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
                document.querySelectorAll('.controls input[type="checkbox"]').forEach(function(cb) {
                    var key = cb.id || cb.dataset.source;
                    if (key in state) cb.checked = state[key];
                });
            } catch(e) {}
        }

        function sourceLabel(s) {
            return { kateandtoms: "Kate & Tom's", groupaccommodation: 'Group Accom.', airbnb: 'Airbnb', thebigdomain: 'Big Domain' }[s] || s;
        }

        function esc(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function highlightGames(games) {
            if (!games || !games.length) return '<span style="color:#ccc;">-</span>';
            var keywords = ['snooker', 'table tennis', 'ping pong'];
            return games.map(function(g) {
                var isHighlight = keywords.some(function(kw) { return g.toLowerCase().includes(kw); });
                return isHighlight ? '<span class="highlight">' + esc(g) + '</span>' : esc(g);
            }).join(', ');
        }

        function getValue(prop, col) {
            switch (col) {
                case 'name': return (prop.name || '').toLowerCase();
                case 'source': return prop.source || '';
                case 'sleeps': return prop.sleeps || 0;
                case 'location': return (prop.location || '').toLowerCase();
                case 'games': return (prop.games || []).join(' ').toLowerCase();
                case 'price': return prop.price || '';
                case 'rating': return prop.rating || '';
                case 'available_dates': return (prop.available_dates || []).length;
                default: return '';
            }
        }

        function applyFilters() {
            var sources = [];
            document.querySelectorAll('[data-source]').forEach(function(cb) {
                if (cb.checked) sources.push(cb.dataset.source);
            });
            var bonusOnly = document.getElementById('bonusOnly').checked;
            var starredOnly = document.getElementById('starredOnly').checked;
            var hideDismissed = document.getElementById('hideDismissed').checked;
            var query = document.getElementById('search').value.toLowerCase().trim();

            displayed = allProperties.filter(function(p) {
                if (!sources.includes(p.source)) return false;
                if (bonusOnly && !p.has_games_bonus) return false;
                if (starredOnly && !isStarred(p.url)) return false;
                if (hideDismissed && isDismissed(p.url)) return false;
                if (query) {
                    var searchable = [p.name, p.location, (p.games||[]).join(' ')].join(' ').toLowerCase();
                    if (!searchable.includes(query)) return false;
                }
                return true;
            });

            sortAndRender();
        }

        function sortAndRender() {
            displayed.sort(function(a, b) {
                var va = getValue(a, sortCol);
                var vb = getValue(b, sortCol);
                if (typeof va === 'number' && typeof vb === 'number') {
                    return sortAsc ? va - vb : vb - va;
                }
                va = String(va); vb = String(vb);
                return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
            });
            render();
        }

        function render() {
            var tbody = document.getElementById('tbody');
            var noResults = document.getElementById('no-results');
            document.getElementById('count').textContent = displayed.length + ' of ' + allProperties.length + ' properties';

            if (displayed.length === 0) {
                tbody.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            noResults.style.display = 'none';

            var html = '';
            for (var i = 0; i < displayed.length; i++) {
                var p = displayed[i];
                var isStarredProp    = isStarred(p.url);
                var isDismissedProp  = isDismissed(p.url);
                var note             = getNote(p.url);
                var rowClass = (p.has_games_bonus ? 'bonus' : '')
                    + (isStarredProp   ? ' starred'   : '')
                    + (isDismissedProp ? ' dismissed'  : '');
                var urlJs = p.url.replace(/\\/g, '\\\\').replace(/'/g, "\\'");

                html += '<tr class="' + rowClass + '">';
                // Star
                html += '<td style="text-align:center;padding:4px;">'
                    + '<button class="star-btn' + (isStarredProp ? ' starred' : '') + '" onclick="toggleStarAndRender(\'' + urlJs + '\', this)">'
                    + (isStarredProp ? '★' : '☆') + '</button></td>';
                // Thumbnail
                if (p.image) {
                    html += '<td style="padding:4px 8px;">'
                        + '<div class="thumb-wrap">'
                        + '<a href="' + esc(p.url) + '" target="_blank"><img class="thumb" src="' + esc(p.image) + '" alt="" onerror="this.parentElement.parentElement.parentElement.style.display=\'none\'"></a>'
                        + '<img class="thumb-large" src="' + esc(p.image) + '" alt="">'
                        + '</div></td>';
                } else {
                    html += '<td></td>';
                }
                html += '<td><a class="prop-link" href="' + esc(p.url) + '" target="_blank">' + esc(p.name) + '</a>';
                if (p.has_games_bonus) html += ' <span class="bonus-star">&#9733;</span>';
                html += '</td>';
                html += '<td><span class="source-badge ' + p.source + '">' + sourceLabel(p.source) + '</span></td>';
                html += '<td>' + (p.sleeps || '-') + '</td>';
                html += '<td>' + esc(p.location) + '</td>';
                html += '<td class="games-list">' + highlightGames(p.games) + '</td>';
                html += '<td>' + esc(p.price) + '</td>';
                html += '<td>' + esc(p.rating) + '</td>';
                html += '<td class="dates">' + (p.available_dates && p.available_dates.length ? esc(p.available_dates.join(', ')) : '<span style="color:#ccc;">-</span>') + '</td>';
                // Notes
                html += '<td class="note-cell">'
                    + '<textarea class="note-ta" placeholder="Add notes…" oninput="scheduleNoteSave(\'' + urlJs + '\', this.value)">'
                    + esc(note) + '</textarea></td>';
                // Dismiss
                html += '<td style="white-space:nowrap;">'
                    + '<button class="dismiss-btn' + (isDismissedProp ? ' dismissed' : '') + '" onclick="toggleDismissAndRender(\'' + urlJs + '\', this)">'
                    + (isDismissedProp ? 'Undismiss' : 'Not suitable') + '</button></td>';
                html += '</tr>';
            }
            tbody.innerHTML = html;
        }

        // Sort on header click
        document.getElementById('header-row').addEventListener('click', function(e) {
            var th = e.target.closest('th');
            if (!th) return;
            var col = th.dataset.col;
            if (!col) return;

            if (sortCol === col) {
                sortAsc = !sortAsc;
            } else {
                sortCol = col;
                sortAsc = true;
            }

            document.querySelectorAll('#header-row th').forEach(function(h) {
                h.classList.remove('sorted');
                if (h.querySelector('.arrow')) h.querySelector('.arrow').innerHTML = '&#9650;';
            });
            th.classList.add('sorted');
            th.querySelector('.arrow').innerHTML = sortAsc ? '&#9650;' : '&#9660;';

            sortAndRender();
        });

        // Track mouse for large thumbnail preview
        document.addEventListener('mousemove', function(e) {
            var large = document.querySelector('.thumb-wrap:hover .thumb-large');
            if (large) {
                large.style.left = e.clientX + 'px';
                large.style.top = e.clientY + 'px';
            }
        });

        // ── Scrape panel (localhost only) ──
        (function() {
            var h = location.hostname;
            var isLocal = h === 'localhost' || h === '127.0.0.1' || h === '::1' || h === '[::1]';
            if (!isLocal) return;
            var panel = document.getElementById('scrape-panel');
            panel.style.display = 'flex';
        })();

        var _scrapeEs = null;

        function startScrape(source) {
            if (_scrapeEs) return;
            var btns = document.querySelectorAll('.scrape-btn');
            btns.forEach(function(b) { b.disabled = true; b.classList.remove('running','done','error'); });
            document.getElementById('btn-kill').style.display = 'inline-block';

            var logEl = document.getElementById('scrape-log-wrap');
            logEl.style.display = 'block';
            logEl.textContent = '';

            var clickedBtn = null;
            btns.forEach(function(b) {
                if (b.getAttribute('onclick') === "startScrape('" + source + "')") clickedBtn = b;
            });
            if (clickedBtn) clickedBtn.classList.add('running');

            _scrapeEs = new EventSource('/scrape?source=' + source);

            _scrapeEs.onmessage = function(e) {
                var line = JSON.parse(e.data);
                if (line.startsWith('__done__:')) {
                    var code = line.split(':')[1];
                    _scrapeEs.close(); _scrapeEs = null;
                    btns.forEach(function(b) { b.disabled = false; b.classList.remove('running'); });
                    document.getElementById('btn-kill').style.display = 'none';
                    if (clickedBtn) {
                        if (code === '0') clickedBtn.classList.add('done');
                        else clickedBtn.classList.add('error');
                    }
                    logEl.textContent += '\n[Done: exit ' + code + ']';
                    logEl.scrollTop = logEl.scrollHeight;
                    if (code === '0') {
                        loadProperties().then(function(data) {
                            allProperties = data;
                            displayed = allProperties.slice();
                            sortAndRender();
                        });
                    }
                } else {
                    logEl.textContent += line + '\n';
                    logEl.scrollTop = logEl.scrollHeight;
                }
            };

            _scrapeEs.onerror = function() {
                if (_scrapeEs) { _scrapeEs.close(); _scrapeEs = null; }
                btns.forEach(function(b) { b.disabled = false; b.classList.remove('running'); });
                document.getElementById('btn-kill').style.display = 'none';
                if (clickedBtn) clickedBtn.classList.add('error');
                logEl.textContent += '\n[Connection error]';
            };
        }

        function killScrape() {
            if (_scrapeEs) { _scrapeEs.close(); _scrapeEs = null; }
            fetch('/scrape/kill', { method: 'POST' });
            document.querySelectorAll('.scrape-btn').forEach(function(b) { b.disabled = false; b.classList.remove('running'); });
            document.getElementById('btn-kill').style.display = 'none';
            document.getElementById('scrape-log-wrap').textContent += '\n[Killed]';
        }

        var PROPS_BIN = 'https://api.jsonbin.io/v3/b/69a013e2ae596e708f4b8024/latest';
        var PROPS_KEY = '$2a$10$GM2DacykC6URSakJENStXORhYWLBkBdhNtQdDHtOw.7FoSOpfpcrS';

        function loadProperties() {
            return fetch('./properties.json')
                .then(function(r) { return r.ok ? r.json() : Promise.reject('HTTP ' + r.status); })
                .catch(function(err) {
                    console.warn('Local properties.json failed, trying JSONbin:', err);
                    return fetch(PROPS_BIN, { headers: { 'X-Access-Key': PROPS_KEY } })
                        .then(function(r) { return r.ok ? r.json() : Promise.reject('HTTP ' + r.status); })
                        .then(function(d) { return d.record || []; })
                        .catch(function() { return []; });
                });
        }

        // Load data and state in parallel
        restoreFilterState();
        Promise.all([
            loadProperties(),
            loadState()
        ]).then(function(results) {
            allProperties = results[0];
            applyFilters();
        }).catch(function() {
            document.getElementById('no-results').style.display = 'block';
            document.getElementById('no-results').textContent = 'Could not load properties.json. Run npm run scrape first.';
        });
    </script>
</body>
</html>
