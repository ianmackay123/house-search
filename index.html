<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Search - Dog Friendly (Sleeps 20+) | Sep 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #map { width: 100%; height: 100vh; }
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            font-size: 13px;
            z-index: 1000;
            max-width: 340px;
        }
        .legend h3 { margin-bottom: 8px; font-size: 14px; }
        .legend-item { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .legend-dot.red { background: #e74c3c; }
        .legend-dot.blue { background: #3498db; }
        .legend-dot.green { background: #27ae60; }
        .legend-dot.gold { background: #f39c12; }
        .filter-controls {
            position: absolute;
            top: 12px;
            right: 12px;
            background: white;
            padding: 10px 14px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            z-index: 1000;
            font-size: 13px;
        }
        .filter-controls label { display: block; margin: 3px 0; cursor: pointer; }
        .filter-controls label input { margin-right: 6px; }
        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; font-size: 18px; color: #333;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="loading" class="loading-overlay">Loading properties...</div>
    <div class="legend">
        <h3>House Search - Sep 2026</h3>
        <div class="legend-item"><span class="legend-dot gold"></span> Starred / interested</div>
        <div class="legend-item"><span class="legend-dot green"></span> Has snooker / table tennis</div>
        <div class="legend-item"><span class="legend-dot blue"></span> All other properties</div>
        <div class="legend-item"><span class="legend-dot" style="background:#aaa;"></span> Dismissed</div>
        <p style="margin-top:8px;font-size:11px;color:#666;">Click pins for details & links. Dogs | Sleeps 20+ | 24-27 or 25-28 Sep</p>
        <a href="./table.html" style="display:inline-block;margin-top:8px;font-size:12px;color:#2980b9;">View as table &rarr;</a>
    </div>
    <div class="filter-controls" id="filters">
        <strong>Show:</strong>
    </div>

    <style>
        #scrape-panel {
            position: absolute;
            bottom: 20px;
            right: 12px;
            background: white;
            padding: 10px 14px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            z-index: 1000;
            font-size: 13px;
            width: 280px;
            display: none;
        }
        #scrape-panel strong { display: block; margin-bottom: 6px; }
        .scrape-btn {
            display: inline-block;
            padding: 5px 10px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            background: #2c3e50;
            color: white;
        }
        .scrape-btn:disabled { opacity: 0.6; cursor: default; }
        .scrape-btn.running { background: #e67e22; }
        .scrape-btn.done { background: #27ae60; }
        .scrape-btn.error { background: #e74c3c; }
        #scrape-log {
            margin-top: 8px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 11px;
            font-family: monospace;
            background: #f4f4f4;
            padding: 5px;
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
        }
    </style>
    <div id="scrape-panel">
        <strong>Scrape data</strong>
        <div>
            <button class="scrape-btn" onclick="startScrape('all')">All</button>
            <button class="scrape-btn" onclick="startScrape('kateandtoms')">K&amp;T</button>
            <button class="scrape-btn" onclick="startScrape('airbnb')">Airbnb</button>
            <button class="scrape-btn" onclick="startScrape('groupaccommodation')">Group Accom.</button>
            <button class="scrape-btn" onclick="startScrape('thebigdomain')">Big Domain</button>
            <button class="scrape-btn" onclick="startScrape('bighouseexperience')">Big House Exp.</button>
            <button class="scrape-btn" onclick="startScrape('snaptrip')">Snaptrip</button>
            <button class="scrape-btn" id="btn-kill" style="background:#c0392b;display:none;" onclick="killScrape()">Stop</button>
        </div>
        <div id="scrape-log"></div>
    </div>
    <script src="./state.js"></script>
    <script>
        let leafletMap;
        const layerGroups = {};
        const markersByUrl = {}; // url -> { marker, group, prop }

        function toggleLayer(source) {
            if (!leafletMap || !layerGroups[source]) return;
            const cb = document.getElementById('show_' + source);
            if (cb.checked) {
                layerGroups[source].addTo(leafletMap);
            } else {
                leafletMap.removeLayer(layerGroups[source]);
            }
            applyStarredFilter();
        }

        function createIcon(color, size) {
            return L.divIcon({
                className: 'custom-pin',
                html: '<div style="width:' + size + 'px;height:' + size + 'px;background:' + color + ';border:3px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>',
                iconSize: [size, size],
                iconAnchor: [size/2, size/2],
                popupAnchor: [0, -size/2 - 2]
            });
        }

        function getIcon(prop) {
            if (isDismissed(prop.url)) return createIcon('#aaaaaa', 22);
            if (isStarred(prop.url)) return createIcon('#f39c12', 32);
            if (prop.has_games_bonus) return createIcon('#27ae60', 28);
            return createIcon('#3498db', 24);
        }

        async function toggleStarFromPopup(url, btn) {
            var isNow = await toggleStar(url);
            btn.textContent = isNow ? '★ Starred' : '☆ Star this';
            btn.style.background = isNow ? '#f39c12' : '#95a5a6';
            var entry = markersByUrl[url];
            if (entry) entry.marker.setIcon(getIcon(entry.prop));
            applyStarredFilter();
        }

        async function toggleDismissFromPopup(url, btn) {
            var isNow = await toggleDismissed(url);
            btn.textContent = isNow ? 'Undismiss' : 'Not suitable';
            btn.style.background = isNow ? '#e74c3c' : '#bdc3c7';
            var entry = markersByUrl[url];
            if (entry) entry.marker.setIcon(getIcon(entry.prop));
            applyStarredFilter();
        }

        function applyStarredFilter() {
            var starredOnly = document.getElementById('show_starred_only') && document.getElementById('show_starred_only').checked;
            Object.keys(markersByUrl).forEach(function(url) {
                var entry = markersByUrl[url];
                var sourceCb = document.getElementById('show_' + entry.prop.source);
                var sourceOn = !sourceCb || sourceCb.checked;
                var starOn = !starredOnly || isStarred(url);
                entry.marker.setIcon(getIcon(entry.prop));
                if (sourceOn && starOn) {
                    if (!entry.group.hasLayer(entry.marker)) entry.group.addLayer(entry.marker);
                } else {
                    if (entry.group.hasLayer(entry.marker)) entry.group.removeLayer(entry.marker);
                }
            });
        }

        function sourceLabel(source) {
            var labels = {
                kateandtoms: "Kate & Tom's",
                groupaccommodation: 'Group Accom.',
                airbnb: 'Airbnb',
                thebigdomain: 'Big Domain'
            };
            return labels[source] || source;
        }

        function sourceLinkStyle(source) {
            if (source === 'airbnb') return 'background:#FF5A5F';
            if (source === 'thebigdomain') return 'background:#8e44ad';
            if (source === 'bighouseexperience') return 'background:#e67e22';
            return 'background:#2c3e50';
        }

        function esc(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function buildPopup(prop) {
            var html = '<div style="font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',Roboto,sans-serif;width:260px;">';

            // Thumbnail image
            if (prop.image) {
                html += '<a href="' + esc(prop.url) + '" target="_blank" rel="noopener noreferrer">'
                    + '<img src="' + esc(prop.image) + '" alt="' + esc(prop.name) + '"'
                    + ' style="width:100%;height:150px;object-fit:cover;border-radius:4px;display:block;margin-bottom:8px;"'
                    + ' onerror="this.style.display=\'none\'">'
                    + '</a>';
            }

            html += '<h3 style="margin:0 0 6px;font-size:15px;">' + esc(prop.name) + '</h3>';

            if (prop.sleeps) html += '<p style="margin:2px 0;font-size:13px;"><strong>Sleeps:</strong> ' + prop.sleeps + '</p>';
            if (prop.location) html += '<p style="margin:2px 0;font-size:13px;"><strong>Location:</strong> ' + esc(prop.location) + '</p>';
            if (prop.games && prop.games.length) html += '<p style="margin:2px 0;font-size:13px;"><strong>Games:</strong> ' + esc(prop.games.join(', ')) + '</p>';
            if (prop.price) html += '<p style="margin:2px 0;font-size:13px;"><strong>Price:</strong> ' + esc(prop.price) + '</p>';
            if (prop.rating) html += '<p style="margin:2px 0;font-size:13px;"><strong>Rating:</strong> ' + esc(prop.rating) + '</p>';
            if (prop.available_dates && prop.available_dates.length) {
                html += '<p style="margin:2px 0;font-size:13px;"><strong>Available:</strong> ' + esc(prop.available_dates.join(', ')) + '</p>';
            }

            if (prop.has_games_bonus) {
                html += '<p style="margin:4px 0 2px;font-size:11px;color:#e74c3c;font-weight:bold;">&#9733; HAS TABLE TENNIS / SNOOKER</p>';
            }

            html += '<p style="margin:2px 0;font-size:11px;color:#888;">Source: ' + sourceLabel(prop.source) + '</p>';

            var isStarredProp   = isStarred(prop.url);
            var isDismissedProp = isDismissed(prop.url);
            var note            = getNote(prop.url);

            var urlQ = "'" + prop.url + "'"; // single-quoted for safe use inside onclick="..."

            // Notes textarea
            html += '<textarea'
                + ' oninput="scheduleNoteSave(' + urlQ + ', this.value)"'
                + ' placeholder="Add notes…"'
                + ' style="width:100%;margin-top:8px;padding:5px 7px;font-family:inherit;font-size:12px;border:1px solid #ddd;border-radius:4px;resize:vertical;min-height:42px;box-sizing:border-box;">'
                + esc(note) + '</textarea>';

            // Action buttons row
            html += '<div style="margin-top:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">';
            html += '<a href="' + esc(prop.url) + '" target="_blank" rel="noopener noreferrer"'
                + ' style="display:inline-block;padding:6px 12px;' + sourceLinkStyle(prop.source) + ';color:white;text-decoration:none;border-radius:4px;font-size:12px;flex:1;">'
                + 'View &rarr;</a>';
            html += '<button onclick="toggleStarFromPopup(' + urlQ + ', this)"'
                + ' style="padding:6px 8px;background:' + (isStarredProp ? '#f39c12' : '#95a5a6') + ';color:white;border:none;border-radius:4px;font-size:12px;cursor:pointer;">'
                + (isStarredProp ? '★ Starred' : '☆ Star') + '</button>';
            html += '<button onclick="toggleDismissFromPopup(' + urlQ + ', this)"'
                + ' style="padding:6px 8px;background:' + (isDismissedProp ? '#e74c3c' : '#bdc3c7') + ';color:white;border:none;border-radius:4px;font-size:12px;cursor:pointer;">'
                + (isDismissedProp ? 'Undismiss' : 'Not suitable') + '</button>';
            html += '</div>';
            html += '</div>';
            return html;
        }

        var PROPS_BIN = 'https://api.jsonbin.io/v3/b/69a013e2ae596e708f4b8024/latest';
        var PROPS_KEY = '$2a$10$GM2DacykC6URSakJENStXORhYWLBkBdhNtQdDHtOw.7FoSOpfpcrS';

        async function loadProperties() {
            try {
                var resp = await fetch(PROPS_BIN, { headers: { 'X-Access-Key': PROPS_KEY } });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var data = await resp.json();
                return data.record || [];
            } catch (err) {
                console.warn('JSONbin load failed, trying local:', err.message);
                try {
                    var resp2 = await fetch('./properties.json');
                    if (!resp2.ok) throw new Error('HTTP ' + resp2.status);
                    return await resp2.json();
                } catch (err2) {
                    console.warn('Could not load properties.json:', err2.message);
                    return [];
                }
            }
        }

        function renderProperties(properties) {
            // Clear existing layers and markers
            Object.keys(layerGroups).forEach(function(src) {
                leafletMap.removeLayer(layerGroups[src]);
                delete layerGroups[src];
            });
            Object.keys(markersByUrl).forEach(function(k) { delete markersByUrl[k]; });

            // Rebuild filter checkboxes (preserve starred-only checkbox)
            var filtersEl = document.getElementById('filters');
            var starredOnlyChecked = document.getElementById('show_starred_only') ? document.getElementById('show_starred_only').checked : false;
            filtersEl.innerHTML = '<strong>Show:</strong>';

            var bySource = {};
            for (var i = 0; i < properties.length; i++) {
                var prop = properties[i];
                if (!prop.lat || !prop.lng) continue;
                var src = prop.source || 'unknown';
                if (!bySource[src]) bySource[src] = [];
                bySource[src].push(prop);
            }

            var allMarkers = [];
            var knownSources = ['kateandtoms', 'groupaccommodation', 'airbnb', 'thebigdomain', 'bighouseexperience', 'snaptrip'];
            var allSources = knownSources.concat(Object.keys(bySource).filter(function(s) { return knownSources.indexOf(s) === -1; }));

            for (var s = 0; s < allSources.length; s++) {
                var source = allSources[s];
                var props = bySource[source] || [];
                var wasChecked = document.getElementById('show_' + source);
                var keepChecked = !wasChecked || wasChecked.checked;
                var group = layerGroups[source] || L.layerGroup();

                for (var j = 0; j < props.length; j++) {
                    var p = props[j];
                    var marker = L.marker([p.lat, p.lng], { icon: getIcon(p) });
                    marker.bindPopup(buildPopup(p), { maxWidth: 320 });
                    group.addLayer(marker);
                    allMarkers.push(marker);
                    markersByUrl[p.url] = { marker: marker, group: group, prop: p };
                }

                if (keepChecked) group.addTo(leafletMap);
                layerGroups[source] = group;

                var count = props.length ? ' (' + props.length + ')' : '';
                var label = document.createElement('label');
                label.style.color = props.length ? '' : '#aaa';
                label.innerHTML = '<input type="checkbox" id="show_' + source + '" ' + (keepChecked ? 'checked' : '') + ' onchange="toggleLayer(\'' + source + '\')"> ' + sourceLabel(source) + count;
                filtersEl.appendChild(label);
            }

            var starLabel = document.createElement('label');
            starLabel.style.marginTop = '6px';
            starLabel.style.borderTop = '1px solid #eee';
            starLabel.style.paddingTop = '6px';
            starLabel.innerHTML = '<input type="checkbox" id="show_starred_only" ' + (starredOnlyChecked ? 'checked' : '') + ' onchange="applyStarredFilter()"> ★ Starred only';
            filtersEl.appendChild(starLabel);

            applyStarredFilter();

            if (properties.length === 0) {
                document.getElementById('loading').style.display = 'flex';
                document.getElementById('loading').textContent = 'No properties found. Run npm run scrape to generate properties.json';
            }
        }

        async function init() {
            await Promise.all([loadProperties(), loadState()]).then(function(results) {
                var properties = results[0];

                // Load Leaflet
                var leafletCSS = document.createElement('link');
                leafletCSS.rel = 'stylesheet';
                leafletCSS.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
                document.head.appendChild(leafletCSS);

                var leafletJS = document.createElement('script');
                leafletJS.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
                leafletJS.onload = function() {
                    document.getElementById('loading').style.display = 'none';
                    leafletMap = L.map('map').setView([52.0, -1.8], 6);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap contributors',
                        maxZoom: 18
                    }).addTo(leafletMap);
                    renderProperties(properties);
                    if (Object.keys(markersByUrl).length > 0) {
                        var fg = L.featureGroup(Object.values(markersByUrl).map(function(e) { return e.marker; }));
                        leafletMap.fitBounds(fg.getBounds().pad(0.1));
                    }
                };
                document.head.appendChild(leafletJS);
            });
        }

        init();

        // ── Scrape panel (localhost only) ──
        (function() {
            var h = location.hostname;
            var isLocal = h === 'localhost' || h === '127.0.0.1' || h === '::1' || h === '[::1]';
            if (!isLocal) return;
            document.getElementById('scrape-panel').style.display = 'block';
        })();

        var _scrapeSource = null;
        var _scrapeEs = null;
        var _scrapeButtons = {};

        function startScrape(source) {
            if (_scrapeEs) return; // already running
            var btns = document.querySelectorAll('.scrape-btn');
            btns.forEach(function(b) { b.disabled = true; b.classList.remove('running','done','error'); });
            document.getElementById('btn-kill').style.display = 'inline-block';

            var logEl = document.getElementById('scrape-log');
            logEl.style.display = 'block';
            logEl.textContent = '';

            // find the clicked button
            var clickedBtn = null;
            btns.forEach(function(b) {
                if (b.textContent.trim().toLowerCase().replace('&','').replace(';','') ===
                    (source === 'all' ? 'all' : source === 'kateandtoms' ? 'k&t' : source === 'airbnb' ? 'airbnb' : 'group accom.')) {
                    clickedBtn = b;
                }
            });
            // simpler: find by onclick attribute
            btns.forEach(function(b) {
                if (b.getAttribute('onclick') === "startScrape('" + source + "')") clickedBtn = b;
            });
            if (clickedBtn) { clickedBtn.classList.add('running'); clickedBtn.textContent = '⏳ ' + clickedBtn.textContent.replace('⏳ ',''); }

            // Clear markers for sources being re-scraped
            if (leafletMap) {
                var toClear = source === 'all' ? Object.keys(layerGroups) : [source];
                toClear.forEach(function(src) {
                    if (layerGroups[src]) {
                        leafletMap.removeLayer(layerGroups[src]);
                        delete layerGroups[src];
                    }
                    Object.keys(markersByUrl).forEach(function(url) {
                        if (markersByUrl[url].prop.source === src) delete markersByUrl[url];
                    });
                });
                // Rebuild filter checkboxes to reflect cleared sources
                var filtersEl = document.getElementById('filters');
                var starredOnlyChecked = document.getElementById('show_starred_only') ? document.getElementById('show_starred_only').checked : false;
                filtersEl.innerHTML = '<strong>Show:</strong>';
                Object.keys(layerGroups).forEach(function(src) {
                    var count = Object.values(markersByUrl).filter(function(e) { return e.prop.source === src; }).length;
                    var label = document.createElement('label');
                    label.innerHTML = '<input type="checkbox" id="show_' + src + '" checked onchange="toggleLayer(\'' + src + '\')"> ' + sourceLabel(src) + ' (' + count + ')';
                    filtersEl.appendChild(label);
                });
                var starLabel = document.createElement('label');
                starLabel.style.marginTop = '6px'; starLabel.style.borderTop = '1px solid #eee'; starLabel.style.paddingTop = '6px';
                starLabel.innerHTML = '<input type="checkbox" id="show_starred_only" ' + (starredOnlyChecked ? 'checked' : '') + ' onchange="applyStarredFilter()"> ★ Starred only';
                filtersEl.appendChild(starLabel);
            }

            _scrapeSource = source;
            _scrapeEs = new EventSource('/scrape?source=' + source);

            var _refreshTimer = null;
            function scheduleMapRefresh() {
                if (_refreshTimer) clearTimeout(_refreshTimer);
                _refreshTimer = setTimeout(function() {
                    loadProperties().then(function(props) { if (leafletMap) renderProperties(props); });
                }, 2000);
            }

            _scrapeEs.onmessage = function(e) {
                var line = JSON.parse(e.data);
                if (line.startsWith('__done__:')) {
                    var code = line.split(':')[1];
                    _scrapeEs.close(); _scrapeEs = null;
                    if (_refreshTimer) clearTimeout(_refreshTimer);
                    btns.forEach(function(b) { b.disabled = false; b.classList.remove('running'); });
                    document.getElementById('btn-kill').style.display = 'none';
                    if (clickedBtn) {
                        var label = clickedBtn.textContent.replace('⏳ ','').replace('✓ ','').replace('✗ ','');
                        if (code === '0') { clickedBtn.classList.add('done'); clickedBtn.textContent = '✓ ' + label; }
                        else { clickedBtn.classList.add('error'); clickedBtn.textContent = '✗ ' + label; }
                    }
                    logEl.textContent += '\n[Done: exit ' + code + ']';
                    logEl.scrollTop = logEl.scrollHeight;
                    // Final reload of map with fresh data
                    loadProperties().then(function(props) { if (leafletMap) renderProperties(props); });
                } else {
                    logEl.textContent += line + '\n';
                    logEl.scrollTop = logEl.scrollHeight;
                    // Refresh map whenever properties.json is updated during scrape
                    if (line.indexOf('[Save] Wrote') !== -1) scheduleMapRefresh();
                }
            };

            _scrapeEs.onerror = function() {
                if (_scrapeEs) { _scrapeEs.close(); _scrapeEs = null; }
                btns.forEach(function(b) { b.disabled = false; b.classList.remove('running'); });
                document.getElementById('btn-kill').style.display = 'none';
                if (clickedBtn) {
                    var label = clickedBtn.textContent.replace('⏳ ','');
                    clickedBtn.classList.add('error'); clickedBtn.textContent = '✗ ' + label;
                }
                logEl.textContent += '\n[Connection error]';
            };
        }

        function killScrape() {
            if (_scrapeEs) { _scrapeEs.close(); _scrapeEs = null; }
            fetch('/scrape/kill', { method: 'POST' });
            document.querySelectorAll('.scrape-btn').forEach(function(b) { b.disabled = false; b.classList.remove('running'); });
            document.getElementById('btn-kill').style.display = 'none';
            document.getElementById('scrape-log').textContent += '\n[Killed]';
        }
    </script>
</body>
</html>
